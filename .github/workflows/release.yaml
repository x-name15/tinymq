name: Release TinyMQ

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write 

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23' 

      - name: Get version from CHANGELOG
        id: version
        run: |
          VERSION=$(grep -m1 '## \[' CHANGELOG.md | sed 's/## \[\([^]]*\)\].*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected Version: $VERSION"

      - name: Extract notes from CHANGELOG
        id: notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NOTES=$(awk "/## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Extract title from CHANGELOG
        id: title
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TITLE=$(grep -m1 "## \[${VERSION}\]" CHANGELOG.md | sed 's/## \[[^]]*\] - [0-9-]* — //')
          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "Detected Title: $TITLE"

      - name: Update version in version.go
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/const Version = \"[^\"]*\"/const Version = \"${VERSION}\"/" cmd/tinymq/version.go

      - name: Update the README file
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s|Release-v[0-9]*\.[0-9]*\.[0-9]*-green|Release-v${VERSION}-green|g" README.md
          sed -i "s|v[0-9]*\.[0-9]*\.[0-9]* - CHANGE LOG|v${VERSION} - CHANGE LOG|g" README.md
          sed -i "s|v[0-9]*\.[0-9]*\.[0-9]* - Release notes|v${VERSION} - Release notes|g" README.md
          sed -i "s|releases/tag/[0-9]*\.[0-9]*\.[0-9]*|releases/tag/${VERSION}|g" README.md

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md cmd/tinymq/version.go
          git diff --staged --quiet || git commit -m "chore: actualizar versión a v${{ steps.version.outputs.version }}"
          git push

      - name: Create tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git tag "v${VERSION}" || echo "Tag already exists, continuing..."
          git push origin "v${VERSION}" || echo "Tag already on remote, continuing..."

      - name: Build Windows
        run: GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o dist/tinymq-windows-amd64.exe ./cmd/tinymq

      - name: Build Linux
        run: GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o dist/tinymq-linux-amd64 ./cmd/tinymq

      - name: Build macOS Intel
        run: GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o dist/tinymq-darwin-amd64 ./cmd/tinymq

      - name: Build macOS Apple Silicon
        run: GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o dist/tinymq-darwin-arm64 ./cmd/tinymq

      - name: Create ZIP file with source code
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          zip -r "dist/tinymq-source-${VERSION}.zip" . \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "dist/*" \
            --exclude "*.exe" \
            --exclude "data/*" 

      - name: Create a GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: "v${{ steps.version.outputs.version }}: ${{ steps.title.outputs.title }}"
          body: |
            ${{ steps.notes.outputs.notes }}
            ---
            ## Downloads
            | Operating System | File Name|
            |-------------------|---------|
            | Windows (x64) | `tinymq-windows-amd64.exe` |
            | Linux (x64) | `tinymq-linux-amd64` |
            | macOS (Intel) | `tinymq-darwin-amd64` |
            | macOS (Apple Silicon) | `tinymq-darwin-arm64` |
            
            **Docker Image:** `docker pull ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}`
            
            View [CHANGELOG completo](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)
          files: |
            dist/tinymq-windows-amd64.exe
            dist/tinymq-linux-amd64
            dist/tinymq-darwin-amd64
            dist/tinymq-darwin-arm64
            dist/tinymq-source-${{ steps.version.outputs.version }}.zip
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}