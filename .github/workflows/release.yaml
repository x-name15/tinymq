name: Release TinyMQ

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26' 
          
      - name: Get version from CHANGELOG
        id: version
        run: |
          VERSION=$(grep -m1 '## \[' CHANGELOG.md | sed 's/## \[\([^]]*\)\].*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Extract notes from CHANGELOG
        id: notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NOTES=$(awk "/## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Extract title from CHANGELOG
        id: title
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TITLE=$(grep -m1 "## \[${VERSION}\]" CHANGELOG.md | sed 's/## \[[^]]*\] - [0-9-]* — //')
          echo "title=$TITLE" >> $GITHUB_OUTPUT

      - name: Update files and Commit
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/const Version = \"[^\"]*\"/const Version = \"${VERSION}\"/" cmd/tinymq/version.go
          sed -i "s|Release-v[0-9.]*-green|Release-v${VERSION}-green|g" README.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md cmd/tinymq/version.go
          git diff --staged --quiet || git commit -m "chore: actualizar versión a v${VERSION}"
          git push
          git tag "v${VERSION}" || true
          git push origin "v${VERSION}" || true

      - name: Build Binaries & Package Source
        run: |
          mkdir dist

          # tinymq (server)
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o dist/tinymq-windows-amd64.exe ./cmd/tinymq
          GOOS=linux   GOARCH=amd64 go build -ldflags="-s -w" -o dist/tinymq-linux-amd64       ./cmd/tinymq
          GOOS=darwin  GOARCH=amd64 go build -ldflags="-s -w" -o dist/tinymq-darwin-amd64      ./cmd/tinymq
          GOOS=darwin  GOARCH=arm64 go build -ldflags="-s -w" -o dist/tinymq-darwin-arm64      ./cmd/tinymq

          # tmq (CLI)
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o dist/tmq-windows-amd64.exe ./cmd/tmq
          GOOS=linux   GOARCH=amd64 go build -ldflags="-s -w" -o dist/tmq-linux-amd64       ./cmd/tmq
          GOOS=darwin  GOARCH=amd64 go build -ldflags="-s -w" -o dist/tmq-darwin-amd64      ./cmd/tmq
          GOOS=darwin  GOARCH=arm64 go build -ldflags="-s -w" -o dist/tmq-darwin-arm64      ./cmd/tmq

          # Crear un ZIP limpio con el código fuente para la release
          git archive --format=zip -o dist/tinymq-source-${{ steps.version.outputs.version }}.zip HEAD

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: "v${{ steps.version.outputs.version }}: ${{ steps.title.outputs.title }}"
          body: |
            ${{ steps.notes.outputs.notes }}
            
            ---
            ## 📦 Downloads
            
            | Operating System | Broker Server | CLI Tool (`tmq`) |
            |-------------------|---------------|------------------|
            | **Windows (x64)** | `tinymq-windows-amd64.exe` | `tmq-windows-amd64.exe` |
            | **Linux (x64)** | `tinymq-linux-amd64` | `tmq-linux-amd64` |
            | **macOS (Intel)** | `tinymq-darwin-amd64` | `tmq-darwin-amd64` |
            | **macOS (Apple Silicon)** | `tinymq-darwin-arm64` | `tmq-darwin-arm64` |
            
            **Docker Image:** `docker pull ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}`
            
            View [Full CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)
          files: |
            dist/tinymq-windows-amd64.exe
            dist/tinymq-linux-amd64
            dist/tinymq-darwin-amd64
            dist/tinymq-darwin-arm64
            dist/tmq-windows-amd64.exe
            dist/tmq-linux-amd64
            dist/tmq-darwin-amd64
            dist/tmq-darwin-arm64
            dist/tinymq-source-${{ steps.version.outputs.version }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker images
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
            flez71/tinymq:latest
            flez71/tinymq:${{ steps.version.outputs.version }}