name: TinyMQ CI Gate / Release Gate

on:
  push:
    branches: [ "main", "feature/*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version-file: 'go.mod'
        cache: false

    - name: Verify Code Formatting
      run: |
        if [ -n "$(gofmt -l .)" ]; then
          echo "These files are not formatted properly:"
          gofmt -l .
          echo "Please run 'gofmt -w .' locally and commit the changes."
          exit 1
        fi

    - name: Verify go.mod is tidy
      run: |
        go mod tidy
        if [ -n "$(git status --porcelain go.mod go.sum)" ]; then
          echo "go.mod or go.sum is not tidy. Please run 'go mod tidy' and commit the changes."
          git diff
          exit 1
        fi

    - name: Run Tests (Race Detector + Shuffle)
      run: go test -race -shuffle=on -timeout 30s ./...

    - name: Run Benchmarks (no cache)
      run: go test -bench=. -benchmem -count=1 -timeout 120s ./internal/benchmarks/...

    - name: Build TinyMQ Binary (AMD64)
      run: CGO_ENABLED=0 go build -ldflags="-s -w" -o tinymq ./cmd/tinymq
      
    - name: Build CLI Binary (AMD64)
      run: CGO_ENABLED=0 go build -ldflags="-s -w" -o tmq ./cmd/tmq

    - name: Build ARM64 Binary (Cross‑compile)
      run: CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o tinymq-arm64 ./cmd/tinymq

    - name: Verify ARM64 Binary
      run: file tinymq-arm64 | grep "ARM aarch64"

    - name: Build Windows Binary (AMD64)
      run: CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o tinymq.exe ./cmd/tinymq

    - name: Build macOS Binary (AMD64)
      run: CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o tinymq-darwin ./cmd/tinymq

    - name: Build macOS ARM64 Binary
      run: CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o tinymq-darwin-arm64 ./cmd/tinymq

    - name: Verify Docker Image Size (AMD64)
      run: |
        echo "Building Docker image for size verification..."
        docker build -t tinymq:ci-check .
        
        echo ""
        echo "DOCKER IMAGE SIZE REPORT:"
        docker images tinymq:ci-check
        
        SIZE_BYTES=$(docker inspect -f "{{ .Size }}" tinymq:ci-check)
        SIZE_MB=$(awk "BEGIN {printf \"%.2f\", ${SIZE_BYTES}/1048576}")
        
        echo ""
        echo "Calculated Size: ${SIZE_MB} MB"
        
        if awk "BEGIN {exit (${SIZE_MB} > 25.0 ? 0 : 1)}"; then
          echo "ERROR: The Docker image (${SIZE_MB} MB) exceeded the strict 25MB limit!"
          echo "Please check for unnecessary dependencies or missing stripped binaries."
          exit 1
        fi
        
        echo "SUCCESS: Image size is within the allowed limits."

    - name: Docker Build Check (AMD64)
      run: docker build -t tinymq:test .